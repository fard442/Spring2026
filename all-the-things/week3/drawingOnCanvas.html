<!DOCTYPE html>
<html>
    <head>
        <title>
            Week 3: drawing on canvas Lab
        </title>
        <meta charset="UTF-8">
    </head>

    <body>
        <h1>Canvas drawing example</h1>
        <canvas id="canvas" width="800" height="600" style="border: 1px solid black"></canvas>

        <script>
            //setting up the canvas
            var canvas = document.getElementById("canvas");
            var pencil = canvas.getContext("2d");

            //red rectangle
            pencil.fillStyle = "red";
            pencil.fillRect(50, 50, 150, 50);

            //orange rectangle
            pencil.fillStyle = "#fb0";
            pencil.fillRect(50, 125, 150, 50)

            //green outline
            pencil.strokeStyle = "green";
            pencil.strokeRect(50, 200, 150, 50);

            //final purple boxy
            pencil.strokeStyle = "#f0f";
            pencil.strokeRect(50, 350, 150, 50);
        </script>
    </body>
</html>
